<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<!--
  TEMPLATE: verse-hero
  Observed pattern: daily devotional. A single beautiful line (the day's verse /
  the "manna") as hero, its reference, the mascot, and a gentle CTA.   Fictional pattern: daily-card creatives, refreshed every day. Great for value-first, low-
  friction top-of-funnel. Verse text must be public-domain / licensed.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  .ad {
    position: fixed; inset: 0; overflow: hidden;
    font-family: {{ fonts.body }};
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; text-align: center; padding: 9vmin 6.4vmin;
    background:
      radial-gradient(70% 45% at 50% 22%, {{ palette.glow }} 0%, transparent 60%),
      radial-gradient(80% 50% at 85% 8%, {{ palette.halo_blue }} 0%, transparent 55%),
      linear-gradient(170deg, {{ palette.bg_top }} 0%, {{ palette.bg_mid }} 50%, {{ palette.bg_bottom }} 100%);
  }
  .mascot { width: 20vmin; height: 20vmin; }
  .mascot svg { width: 100%; height: 100%; overflow: visible; }
  .verse {
    font-family: {{ fonts.headline }}; font-weight: 600; font-size: 7.2vmin;
    line-height: 1.16; color: {{ palette.ink }};
  }
  .ref {
    margin-top: 3.4vmin; font-size: 3.2vmin; letter-spacing: .35vmin; text-transform: uppercase;
    color: {{ palette.accent }}; font-weight: 700;
  }
  .foot { display: flex; align-items: center; justify-content: center; gap: 1.9vmin; }
  .foot img { width: 7vmin; height: 7vmin; border-radius: 1.7vmin; box-shadow: 0 .7vmin 2vmin -.7vmin rgba(111,62,36,.5); }
  .foot .brand { font-size: 3.7vmin; font-weight: 800; color: {{ palette.ink }}; }
  .pill {
    margin-left: .6vmin; background: {{ palette.accent }}; color: {{ palette.on_accent }};
    font-weight: 700; font-size: 2.8vmin; padding: 1.3vmin 2.4vmin; border-radius: 999px;
  }
  @media (max-aspect-ratio: 10/16) {
    .ad { padding-top: 250px; padding-bottom: 320px; }
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="mascot">{{{ mascot_svg_inline }}}</div>
    <div>
      <div class="verse">{{ copy.verse }}</div>
      <div class="ref">{{ copy.reference }}</div>
    </div>
    <div class="foot">
      <img src="{{ icon_url }}" alt="">
      <span class="brand">{{ name }}</span>
      <span class="pill">{{ copy.cta }}</span>
    </div>
  </div>
</body>
</html>
