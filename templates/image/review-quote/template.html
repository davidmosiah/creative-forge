<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<!--
  TEMPLATE: review-quote
  Observed pattern: social proof. A real 5-star review IS the creative (CalmStride
  runs this heavily). Big stars, a giant quote mark, the review text, the
  attribution, then brand + CTA. Use REAL App Store reviews only — see PLAYBOOK.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  .ad {
    position: fixed; inset: 0; overflow: hidden;
    font-family: {{ fonts.body }};
    display: flex; flex-direction: column; justify-content: space-between;
    text-align: center; padding: 8vmin 6.4vmin;
    background:
      radial-gradient(90% 60% at 50% 20%, {{ palette.glow }} 0%, transparent 60%),
      linear-gradient(170deg, {{ palette.bg_top }} 0%, {{ palette.bg_mid }} 55%, {{ palette.bg_bottom }} 100%);
  }
  .stars { font-size: 6vmin; letter-spacing: 1.2vmin; color: #f5a623; }
  .quotemark { font-family: {{ fonts.headline }}; font-size: 16vmin; line-height: .5; height: 8vmin; color: {{ palette.accent }}; opacity: .22; }
  .quote {
    font-family: {{ fonts.headline }}; font-weight: 600; font-size: 6.2vmin;
    line-height: 1.18; color: {{ palette.ink }};
  }
  .who { margin-top: 3vmin; font-size: 3vmin; color: {{ palette.ink_soft }}; font-weight: 600; }
  .foot { display: flex; align-items: center; justify-content: center; gap: 1.9vmin; }
  .foot img { width: 7vmin; height: 7vmin; border-radius: 1.7vmin; box-shadow: 0 .7vmin 2vmin -.7vmin rgba(111,62,36,.5); }
  .foot .brand { font-size: 3.7vmin; font-weight: 800; color: {{ palette.ink }}; }
  .pill {
    margin-left: .6vmin; background: {{ palette.accent }}; color: {{ palette.on_accent }};
    font-weight: 700; font-size: 2.8vmin; padding: 1.3vmin 2.4vmin; border-radius: 999px;
  }
  @media (max-aspect-ratio: 10/16) {
    .ad { padding-top: 250px; padding-bottom: 320px; }
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="stars">★★★★★</div>
    <div>
      <div class="quotemark">&ldquo;</div>
      <div class="quote">{{ copy.quote }}</div>
      <div class="who">{{ copy.attribution }}</div>
    </div>
    <div class="foot">
      <img src="{{ icon_url }}" alt="">
      <span class="brand">{{ name }}</span>
      <span class="pill">{{ copy.cta }}</span>
    </div>
  </div>
</body>
</html>
