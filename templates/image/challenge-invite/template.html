<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<!--
  TEMPLATE: challenge-invite
  Observed pattern: definite-timeframe spiritual challenge ("21-day challenge").
  A short dare up top, a HUGE number as the hero with its unit line, the
  mascot vouching beside it, a serif promise, a soft sub, and a download pill.
  All sizing is in vmin so the SAME layout scales across square/portrait/story.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  .ad {
    position: fixed; inset: 0; overflow: hidden;
    font-family: {{ fonts.body }};
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; text-align: center;
    padding: 7.4vmin 5.8vmin;
    background:
      radial-gradient(80% 40% at 50% 30%, {{ palette.glow }} 0%, transparent 62%),
      radial-gradient(90% 55% at 85% 6%, {{ palette.halo_blue }} 0%, transparent 55%),
      radial-gradient(90% 55% at 12% 10%, {{ palette.halo_gold }} 0%, transparent 55%),
      linear-gradient(170deg, {{ palette.bg_top }} 0%, {{ palette.bg_mid }} 46%, {{ palette.bg_bottom }} 100%);
  }
  .kicker {
    font-size: 3.7vmin; font-weight: 700; letter-spacing: .3px;
    color: {{ palette.accent_soft }}; text-transform: uppercase;
  }
  .middle { display: flex; flex-direction: column; align-items: center; gap: 2.2vmin; }
  .mascot { width: 17vmin; height: 17vmin; }
  .mascot svg { width: 100%; height: 100%; overflow: visible; }
  .number {
    font-family: {{ fonts.headline }}; font-weight: 700; font-size: 24vmin;
    line-height: .92; letter-spacing: -.5vmin; color: {{ palette.accent }};
  }
  .unit {
    font-family: {{ fonts.headline }}; font-weight: 600; font-size: 6vmin;
    line-height: 1.05; color: {{ palette.ink }};
  }
  .promise {
    margin-top: 2vmin; font-family: {{ fonts.headline }}; font-weight: 600;
    font-size: 4.4vmin; color: {{ palette.ink }};
  }
  .sub {
    margin-top: 1.6vmin; font-size: 3.35vmin; line-height: 1.4;
    color: {{ palette.ink_soft }}; font-weight: 500;
    max-width: 82%; margin-left: auto; margin-right: auto;
  }
  .foot { display: flex; align-items: center; justify-content: center; gap: 1.9vmin; }
  .foot img { width: 7vmin; height: 7vmin; border-radius: 1.7vmin; box-shadow: 0 .7vmin 2vmin -.7vmin rgba(111,62,36,.5); }
  .foot .brand { font-size: 3.7vmin; font-weight: 800; color: {{ palette.ink }}; }
  .pill {
    margin-left: .6vmin; background: {{ palette.accent }}; color: {{ palette.on_accent }};
    font-weight: 700; font-size: 2.8vmin; padding: 1.3vmin 2.4vmin; border-radius: 999px;
  }
  @media (max-aspect-ratio: 10/16) {
    .ad { padding-top: 250px; padding-bottom: 320px; }
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="kicker">{{ copy.kicker }}</div>
    <div class="middle">
      <div class="mascot">{{{ mascot_svg_inline }}}</div>
      <div>
        <div class="number">{{ copy.number }}</div>
        <div class="unit">{{ copy.unit }}</div>
      </div>
      <div>
        <div class="promise">{{ copy.promise }}</div>
        <div class="sub">{{ copy.sub }}</div>
      </div>
    </div>
    <div class="foot">
      <img src="{{ icon_url }}" alt="">
      <span class="brand">{{ name }}</span>
      <span class="pill">{{ copy.cta }}</span>
    </div>
  </div>
</body>
</html>
